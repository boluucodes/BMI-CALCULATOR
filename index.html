<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>BMI CALCULATOR</title>
</head>
<body>
    <div class="card">
        <h2>BMI CALCULATOR</h2>
        <div class="input-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" class="height" placeholder="e.g. 170">
        </div>

        <div class="input-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" class="weight" placeholder="e.g. 65">
        </div>

        <button class="btn" id="btn">Calculate BMI</button>
        <div class="result-box">
            <div>Your BMI: <span class="bmi-value" id="bmi-value"></span></div>
            <div class="preview" id="preview"></div>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>
</html>
